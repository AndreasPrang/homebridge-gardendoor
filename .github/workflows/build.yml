name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - name: Install libgpiod-dev system dependency
      run: sudo apt-get update && sudo apt-get install -y libgpiod-dev
    - name: Install npm dependencies
      run: npm install
